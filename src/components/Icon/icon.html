<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Icon</h1>

    <section>
      <h2>Ejemplos de íconos</h2>
      <div class="row">
        <i class="eva-3-icon -star" title="star"></i>
        <i class="eva-3-icon -heart" title="heart"></i>
        <i class="eva-3-icon -search" title="search"></i>
        <i class="eva-3-icon -close" title="close"></i>
        <i class="eva-3-icon -cross" title="cross"></i>
        <i class="eva-3-icon -chevron-right" title="chevron-right"></i>
        <i class="eva-3-icon -chevron-down" title="chevron-down"></i>
        <i class="eva-3-icon -arrow-right" title="arrow-right"></i>
        <i class="eva-3-icon -user" title="user"></i>
        <i class="eva-3-icon -edit" title="edit"></i>
        <i class="eva-3-icon -info-circle" title="info-circle"></i>
        <i class="eva-3-icon -checkmark" title="checkmark"></i>
        <i class="eva-3-icon -checkmark-circle-filled" title="checkmark-circle-filled"></i>
        <i class="eva-3-icon -warning" title="warning"></i>
        <i class="eva-3-icon -error" title="error"></i>
        <i class="eva-3-icon -flights-ui" title="flights-ui"></i>
        <i class="eva-3-icon -hotel" title="hotel"></i>
        <i class="eva-3-icon -car" title="car"></i>
      </div>
    </section>

    <section>
      <h2>Tamaños (via font-size)</h2>
      <div class="row" style="align-items:flex-end">
        <i class="eva-3-icon -star" style="font-size:16px"></i>
        <i class="eva-3-icon -star" style="font-size:24px"></i>
        <i class="eva-3-icon -star" style="font-size:32px"></i>
        <i class="eva-3-icon -star" style="font-size:48px"></i>
      </div>
    </section>
  </body>
</html>
