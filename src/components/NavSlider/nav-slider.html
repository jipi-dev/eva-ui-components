<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NavSlider – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>NavSlider</h1>

    <section>
      <h2>Tamaños</h2>
      <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap">
        <div class="eva-3-nav-slider -sm -left"><i class="nav-slider-icon -chevron-left"></i></div>
        <div class="eva-3-nav-slider -sm -right"><i class="nav-slider-icon -chevron-right"></i></div>
        <div class="eva-3-nav-slider -md -left"><i class="nav-slider-icon -chevron-left"></i></div>
        <div class="eva-3-nav-slider -md -right"><i class="nav-slider-icon -chevron-right"></i></div>
        <div class="eva-3-nav-slider -lg -left"><i class="nav-slider-icon -chevron-left"></i></div>
        <div class="eva-3-nav-slider -lg -right"><i class="nav-slider-icon -chevron-right"></i></div>
        <div class="eva-3-nav-slider -xlg -left"><i class="nav-slider-icon -chevron-left"></i></div>
        <div class="eva-3-nav-slider -xlg -right"><i class="nav-slider-icon -chevron-right"></i></div>
      </div>
      <div style="display:flex;gap:1rem;margin-top:.4rem;font-size:.75rem;color:#555">
        <span>sm</span><span>sm</span><span>md</span><span>md</span><span>lg</span><span>lg</span><span>xlg</span><span>xlg</span>
      </div>
    </section>

    <section>
      <h2>Variante -white (sobre fondo claro)</h2>
      <div style="display:flex;gap:1rem;padding:1rem;background:var(--neutral-100,#f5f5f5);border-radius:8px">
        <div class="eva-3-nav-slider -md -white -left"><i class="nav-slider-icon -chevron-left"></i></div>
        <div class="eva-3-nav-slider -md -white -right"><i class="nav-slider-icon -chevron-right"></i></div>
      </div>
    </section>

    <section>
      <h2>Variante -negative (sobre fondo oscuro)</h2>
      <div style="display:flex;gap:1rem;padding:1rem;background:var(--neutral-800,#333);border-radius:8px">
        <div class="eva-3-nav-slider -md -negative -left"><i class="nav-slider-icon -chevron-left"></i></div>
        <div class="eva-3-nav-slider -md -negative -right"><i class="nav-slider-icon -chevron-right"></i></div>
      </div>
    </section>

    <section>
      <h2>Estado deshabilitado (-disabled)</h2>
      <div style="display:flex;gap:1rem">
        <div class="eva-3-nav-slider -md -disabled -left"><i class="nav-slider-icon -chevron-left"></i></div>
        <div class="eva-3-nav-slider -md -right"><i class="nav-slider-icon -chevron-right"></i></div>
      </div>
    </section>
  </body>
</html>
