<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReviewsSummary – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>ReviewsSummary</h1>

    <section>
      <h2>Default</h2>
      <div class="eva-3-reviews-summary" style="max-width:480px">
        <div class="reviews-summary-header">
          <div class="summary-rating-container">
            <div class="eva-3-rating -good -lg"><span class="rating-text">7,5</span></div>
            <div class="summary-text-container">
              <div class="h4">Muy bueno</div>
              <div class="body-1 -eva-3-tc-green-3">Excelente ubicación</div>
              <a class="link" href="#">Ver 95 comentarios</a>
            </div>
          </div>
        </div>

        <div class="reviews-summary-rating-bar">
          <div class="eva-3-progress-bar">
            <div class="progress-bar-content -eva-3-bc-green-3" style="width:81%"></div>
          </div>
          <div class="summary-rating-bar-container">
            <span class="button">Servicios</span>
            <span class="button -eva-3-tc-green-3">8.1</span>
          </div>
        </div>

        <div class="reviews-summary-rating-bar">
          <div class="eva-3-progress-bar">
            <div class="progress-bar-content -eva-3-bc-green-3" style="width:76%"></div>
          </div>
          <div class="summary-rating-bar-container">
            <span class="button">Comodidad</span>
            <span class="button -eva-3-tc-green-3">7.6</span>
          </div>
        </div>

        <div class="reviews-summary-rating-bar">
          <div class="eva-3-progress-bar">
            <div class="progress-bar-content -eva-3-bc-orange-3" style="width:62%"></div>
          </div>
          <div class="summary-rating-bar-container">
            <span class="button">Limpieza</span>
            <span class="button -eva-3-tc-orange-3">6.2</span>
          </div>
        </div>

        <div class="reviews-summary-rating-bar">
          <div class="eva-3-progress-bar">
            <div class="progress-bar-content -eva-3-bc-red-3" style="width:45%"></div>
          </div>
          <div class="summary-rating-bar-container">
            <span class="button">Desayuno</span>
            <span class="button -eva-3-tc-red-3">4.5</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
