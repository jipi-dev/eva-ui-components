<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwipeActions – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>SwipeActions</h1>

    <section>
      <h2>Ambas acciones (-primary-action -secondary-action)</h2>
      <div class="eva-3-card" style="max-width:400px;overflow:hidden">
        <ul class="eva-3-swipe-actions -primary-action -secondary-action">
          <li class="swipe-actions-button -delete" role="menuitem">
            <i class="swipe-actions-icon eva-3-icon-trash -eva-3-icon-xsm"></i>
            Eliminar
          </li>
          <li class="swipe-actions-button" role="menuitem">
            <i class="swipe-actions-icon eva-3-icon-more -eva-3-icon-xsm"></i>
            Más
          </li>
        </ul>
      </div>
    </section>

    <section>
      <h2>Solo acción primaria (-primary-action)</h2>
      <div class="eva-3-card" style="max-width:400px;overflow:hidden">
        <ul class="eva-3-swipe-actions -primary-action">
          <li class="swipe-actions-button -delete" role="menuitem">
            <i class="swipe-actions-icon eva-3-icon-trash -eva-3-icon-xsm"></i>
            Eliminar
          </li>
        </ul>
      </div>
    </section>
  </body>
</html>
