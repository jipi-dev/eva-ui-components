<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Textarea – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Textarea</h1>

    <section>
      <h2>Default</h2>
      <div class="eva-3-textarea -lg" style="width:320px">
        <div class="textarea-container">
          <textarea class="textarea-tag" placeholder="Escribí tu mensaje..."></textarea>
        </div>
      </div>
    </section>

    <section>
      <h2>Estado inválido</h2>
      <div class="eva-3-textarea -lg -invalid" style="width:320px">
        <div class="textarea-container">
          <textarea class="textarea-tag" placeholder="Campo inválido"></textarea>
        </div>
      </div>
    </section>

    <section>
      <h2>Deshabilitado</h2>
      <div class="eva-3-textarea -lg" style="width:320px">
        <div class="textarea-container">
          <textarea class="textarea-tag" placeholder="Deshabilitado" disabled></textarea>
        </div>
      </div>
    </section>
  </body>
</html>
