<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NavViewMore – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>NavViewMore</h1>

    <section>
      <h2>Variante elementos (-elements)</h2>
      <div class="eva-3-nav-view-more -elements">
        <ul class="nav-view-more-list">
          <li class="nav-view-more-item">
            <button class="nav-view-more-link">Vuelos</button>
          </li>
          <li class="nav-view-more-item">
            <button class="nav-view-more-link">Hoteles</button>
          </li>
          <li class="nav-view-more-item">
            <button class="nav-view-more-link">Paquetes</button>
          </li>
        </ul>
        <button class="nav-view-more-button">
          Ver más
          <i class="eva-3-icon-arrow-bold-right nav-view-more-icon"></i>
        </button>
      </div>
    </section>

    <section>
      <h2>Variante imágenes (-images)</h2>
      <div class="eva-3-nav-view-more -images">
        <ul class="nav-view-more-list">
          <li class="nav-view-more-item">
            <button class="nav-view-more-link">
              <img class="nav-view-more-image" src="https://picsum.photos/seed/nav1/60/60" alt="Destino 1" />
              <span>Buenos Aires</span>
            </button>
          </li>
          <li class="nav-view-more-item">
            <button class="nav-view-more-link">
              <img class="nav-view-more-image" src="https://picsum.photos/seed/nav2/60/60" alt="Destino 2" />
              <span>Bariloche</span>
            </button>
          </li>
          <li class="nav-view-more-item">
            <button class="nav-view-more-link">
              <img class="nav-view-more-image" src="https://picsum.photos/seed/nav3/60/60" alt="Destino 3" />
              <span>Córdoba</span>
            </button>
          </li>
        </ul>
        <button class="nav-view-more-button">
          <i class="eva-3-icon-picture nav-view-more-icon"></i>
          Ver galería
        </button>
      </div>
    </section>
  </body>
</html>
