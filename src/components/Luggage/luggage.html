<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luggage – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Luggage</h1>

    <section>
      <h2>Tipos de equipaje</h2>
      <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
        <div class="eva-3-luggage">
          <div class="luggage-item -backpack">
            <img class="luggage-image" src="/ui/dist/resources/sprites/ic-backpack.svg" alt="backpack" />
            <span class="luggage-label">Mochila</span>
          </div>
        </div>
        <div class="eva-3-luggage">
          <div class="luggage-item -carryon">
            <img class="luggage-image" src="/ui/dist/resources/sprites/ic-carry-on.svg" alt="carry-on" />
            <span class="luggage-label">Equipaje de mano</span>
          </div>
        </div>
        <div class="eva-3-luggage">
          <div class="luggage-item -baggage">
            <img class="luggage-image" src="/ui/dist/resources/sprites/ic-baggage.svg" alt="baggage" />
            <span class="luggage-label">Equipaje en bodega</span>
          </div>
        </div>
      </div>
    </section>

    <section>
      <h2>Con medida y peso</h2>
      <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
        <div class="eva-3-luggage">
          <div class="luggage-item -carryon">
            <img class="luggage-image" src="/ui/dist/resources/sprites/ic-carry-on.svg" alt="carry-on" />
            <span class="luggage-extra">30x25x13</span>
            <span class="luggage-label">Hasta 10 kg</span>
          </div>
        </div>
        <div class="eva-3-luggage">
          <div class="luggage-item -baggage -included">
            <img class="luggage-image" src="/ui/dist/resources/sprites/ic-baggage.svg" alt="baggage" />
            <span class="luggage-extra">60x35x25</span>
            <span class="luggage-label">Hasta 23 kg</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
