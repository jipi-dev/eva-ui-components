<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PricingPoints – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>PricingPoints</h1>

    <section>
      <h2>Acumulación de puntos</h2>
      <div class="eva-3-pricing-points">
        <img class="pricing-points-logo" src="https://www.staticontent.com/eva-core/assets/loyalty/loyalty-logo.svg" alt="Pasaporte Despegar" />
        <span>Sumás <span class="-eva-3-bold">300 puntos</span></span>
      </div>
    </section>

    <section>
      <h2>Canje de puntos</h2>
      <div class="eva-3-pricing-points -redemption">
        <img class="pricing-points-logo" src="https://www.staticontent.com/eva-core/assets/loyalty/loyalty-logo.svg" alt="Pasaporte Despegar" />
        <span>Usas <span class="-eva-3-bold">4.058 puntos</span> = $4.000</span>
      </div>
    </section>

    <section>
      <h2>Puntos con contexto en precio</h2>
      <div class="eva-3-pricing-points -sm">
        <img class="pricing-points-logo" src="https://www.staticontent.com/eva-core/assets/loyalty/loyalty-logo.svg" alt="Pasaporte Despegar" />
        <span>5.000 pts</span>
      </div>
    </section>
  </body>
</html>
