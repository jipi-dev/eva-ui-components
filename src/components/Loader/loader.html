<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loader – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Loader</h1>

    <section>
      <h2>Tamaños</h2>
      <div class="row">
        <div class="eva-3-loader">
          <div class="loader-container">
            <div class="loader-spinner">
              <div class="spinner-container spinner-left"><div class="spinner-circle"></div></div>
              <div class="spinner-container spinner-right"><div class="spinner-circle"></div></div>
            </div>
          </div>
        </div>
        <div class="eva-3-loader -lg">
          <div class="loader-container">
            <div class="loader-spinner">
              <div class="spinner-container spinner-left"><div class="spinner-circle"></div></div>
              <div class="spinner-container spinner-right"><div class="spinner-circle"></div></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section>
      <h2>Con texto</h2>
      <div class="row">
        <div class="eva-3-loader">
          <div class="loader-container">
            <div class="loader-spinner">
              <div class="spinner-container spinner-left"><div class="spinner-circle"></div></div>
              <div class="spinner-container spinner-right"><div class="spinner-circle"></div></div>
            </div>
          </div>
          <span class="loader-label">Cargando...</span>
        </div>
      </div>
    </section>

    <section>
      <h2>Blanco (fondo oscuro)</h2>
      <div class="row dark-bg">
        <div class="eva-3-loader -white">
          <div class="loader-container">
            <div class="loader-spinner">
              <div class="spinner-container spinner-left"><div class="spinner-circle"></div></div>
              <div class="spinner-container spinner-right"><div class="spinner-circle"></div></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
