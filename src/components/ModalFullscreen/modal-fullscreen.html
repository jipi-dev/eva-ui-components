<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal Fullscreen – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Modal Fullscreen</h1>

    <section>
      <h2>Modal Fullscreen (inline demo)</h2>
      <div style="position:relative;height:500px;border:1px dashed #ccc;overflow:hidden">
        <div class="eva-3-modal-fullscreen -show-modal" style="position:relative;z-index:1">
          <div class="modal-fullscreen-header">
            <i class="modal-fullscreen-close eva-3-icon -cross" role="button" aria-label="Close modal"></i>
            <div class="modal-fullscreen-header-container">
              <nav style="font-size:12px;color:#888;margin-bottom:4px">Inicio / Sección / Detalle</nav>
              <h4 class="modal-fullscreen-title">Tus productos</h4>
            </div>
          </div>
          <div class="modal-fullscreen-content">
            <p>Contenido principal del modal fullscreen.</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
