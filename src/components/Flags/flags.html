<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flags – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Flags</h1>

    <section>
      <h2>América</h2>
      <div class="row">
        <span class="eva-3-flag -ar" title="Argentina"></span>
        <span class="eva-3-flag -br" title="Brasil"></span>
        <span class="eva-3-flag -cl" title="Chile"></span>
        <span class="eva-3-flag -co" title="Colombia"></span>
        <span class="eva-3-flag -mx" title="México"></span>
        <span class="eva-3-flag -pe" title="Perú"></span>
        <span class="eva-3-flag -uy" title="Uruguay"></span>
        <span class="eva-3-flag -us" title="Estados Unidos"></span>
      </div>
    </section>

    <section>
      <h2>Europa</h2>
      <div class="row">
        <span class="eva-3-flag -es" title="España"></span>
        <span class="eva-3-flag -fr" title="Francia"></span>
        <span class="eva-3-flag -it" title="Italia"></span>
        <span class="eva-3-flag -gb" title="Reino Unido"></span>
        <span class="eva-3-flag -de" title="Alemania"></span>
        <span class="eva-3-flag -pt" title="Portugal"></span>
      </div>
    </section>

    <section>
      <h2>Otros</h2>
      <div class="row">
        <span class="eva-3-flag -cn" title="China"></span>
        <span class="eva-3-flag -jp" title="Japón"></span>
        <span class="eva-3-flag -au" title="Australia"></span>
      </div>
    </section>
  </body>
</html>
