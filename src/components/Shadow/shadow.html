<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Shadow</h1>

    <section>
      <h2>Variantes de sombra</h2>
      <div class="row" style="flex-wrap:wrap;gap:16px">
        <div class="-eva-3-shadow-1" style="padding:16px;background:#fff;border-radius:4px;width:120px;text-align:center">shadow-1</div>
        <div class="-eva-3-shadow-2" style="padding:16px;background:#fff;border-radius:4px;width:120px;text-align:center">shadow-2</div>
        <div class="-eva-3-shadow-static" style="padding:16px;background:#fff;border-radius:4px;width:120px;text-align:center">shadow-static</div>
        <div class="-eva-3-shadow-line" style="padding:16px;background:#fff;border-radius:4px;width:120px;text-align:center">shadow-line</div>
      </div>
    </section>

    <section>
      <h2>Hover (pasar el cursor)</h2>
      <div class="row">
        <div class="-eva-3-shadow-1-hover" style="padding:16px;background:#fff;border-radius:4px;width:120px;text-align:center;cursor:pointer">hover-1</div>
        <div class="-eva-3-shadow-static-hover" style="padding:16px;background:#fff;border-radius:4px;width:120px;text-align:center;cursor:pointer">hover-static</div>
      </div>
    </section>
  </body>
</html>
