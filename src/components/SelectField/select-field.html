<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SelectField – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>SelectField</h1>

    <section>
      <h2>Con Label</h2>
      <div style="max-width:320px">
        <label class="eva-3-label-form -md" for="sf-1" style="display:block;margin-bottom:6px">País de origen</label>
        <div class="eva-3-select -lg">
          <select id="sf-1" class="select-tag">
            <option value="">Seleccioná un país</option>
            <option value="ar">Argentina</option>
            <option value="br">Brasil</option>
            <option value="cl">Chile</option>
          </select>
          <i class="eva-3-icon -chevron-down select-icon"></i>
        </div>
      </div>
    </section>
  </body>
</html>
