<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeValidation – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>CodeValidation</h1>

    <section>
      <h2>Default – 6 celdas lg</h2>
      <div class="eva-3-code-validation">
        <div class="code-validation-input">
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cv1" class="input-tag" type="text" maxlength="1" placeholder="A" /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cv2" class="input-tag" type="text" maxlength="1" placeholder="B" /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cv3" class="input-tag" type="text" maxlength="1" placeholder="C" /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cv4" class="input-tag" type="text" maxlength="1" placeholder="1" /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cv5" class="input-tag" type="text" maxlength="1" placeholder="2" /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cv6" class="input-tag" type="text" maxlength="1" placeholder="3" /></div></div>
        </div>
      </div>
    </section>

    <section>
      <h2>Tamaño md</h2>
      <div class="eva-3-code-validation">
        <div class="code-validation-input">
          <div class="code-validation-cell"><div class="eva-3-input -md"><input id="cvmd1" class="input-tag" type="text" maxlength="1" placeholder="A" /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -md"><input id="cvmd2" class="input-tag" type="text" maxlength="1" placeholder="B" /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -md"><input id="cvmd3" class="input-tag" type="text" maxlength="1" placeholder="C" /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -md"><input id="cvmd4" class="input-tag" type="text" maxlength="1" placeholder="1" /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -md"><input id="cvmd5" class="input-tag" type="text" maxlength="1" placeholder="2" /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -md"><input id="cvmd6" class="input-tag" type="text" maxlength="1" placeholder="3" /></div></div>
        </div>
      </div>
    </section>

    <section>
      <h2>Estado inválido</h2>
      <div class="eva-3-code-validation -invalid">
        <div class="eva-3-validation-inline -invalid">
          <div class="code-validation-input">
            <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvi1" class="input-tag" type="text" maxlength="1" placeholder="A" /></div></div>
            <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvi2" class="input-tag" type="text" maxlength="1" placeholder="B" /></div></div>
            <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvi3" class="input-tag" type="text" maxlength="1" placeholder="C" /></div></div>
            <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvi4" class="input-tag" type="text" maxlength="1" placeholder="1" /></div></div>
            <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvi5" class="input-tag" type="text" maxlength="1" placeholder="2" /></div></div>
            <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvi6" class="input-tag" type="text" maxlength="1" placeholder="3" /></div></div>
          </div>
          <p class="validation-msg">Código inválido. Revisá los caracteres ingresados.</p>
        </div>
      </div>
    </section>

    <section>
      <h2>Deshabilitado</h2>
      <div class="eva-3-code-validation">
        <div class="code-validation-input">
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvd1" class="input-tag" type="text" maxlength="1" placeholder="A" disabled /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvd2" class="input-tag" type="text" maxlength="1" placeholder="B" disabled /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvd3" class="input-tag" type="text" maxlength="1" placeholder="C" disabled /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvd4" class="input-tag" type="text" maxlength="1" placeholder="1" disabled /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvd5" class="input-tag" type="text" maxlength="1" placeholder="2" disabled /></div></div>
          <div class="code-validation-cell"><div class="eva-3-input -lg"><input id="cvd6" class="input-tag" type="text" maxlength="1" placeholder="3" disabled /></div></div>
        </div>
      </div>
    </section>
  </body>
</html>
