<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MosaicGallery – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>MosaicGallery</h1>

    <section>
      <h2>4 imágenes (layout estándar)</h2>
      <div class="eva-3-mosaic-gallery">
        <div class="mosaic-gallery-actions-container">
          <button class="mosaic-gallery-button">Ver galería</button>
        </div>
        <ul class="mosaic-gallery-list -no-gutter">
          <li class="mosaic-gallery-item -lg-8 -md-6">
            <img class="mosaic-gallery-image" src="https://picsum.photos/seed/a/800/500" alt="Imagen 1" />
          </li>
          <li class="mosaic-gallery-item -lg-4 -md-6">
            <img class="mosaic-gallery-image" src="https://picsum.photos/seed/b/400/500" alt="Imagen 2" />
          </li>
          <li class="mosaic-gallery-item -lg-2 -md-3">
            <img class="mosaic-gallery-image" src="https://picsum.photos/seed/c/200/250" alt="Imagen 3" />
          </li>
          <li class="mosaic-gallery-item -lg-2 -md-3">
            <img class="mosaic-gallery-image" src="https://picsum.photos/seed/d/200/250" alt="Imagen 4" />
          </li>
        </ul>
      </div>
    </section>

    <section>
      <h2>2 imágenes</h2>
      <div class="eva-3-mosaic-gallery">
        <ul class="mosaic-gallery-list -no-gutter">
          <li class="mosaic-gallery-item -lg-8 -md-6">
            <img class="mosaic-gallery-image" src="https://picsum.photos/seed/e/800/400" alt="Imagen 1" />
          </li>
          <li class="mosaic-gallery-item -lg-4 -md-6">
            <img class="mosaic-gallery-image" src="https://picsum.photos/seed/f/400/400" alt="Imagen 2" />
          </li>
        </ul>
      </div>
    </section>
  </body>
</html>
