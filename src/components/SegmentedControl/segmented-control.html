<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SegmentedControl – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>SegmentedControl</h1>

    <section>
      <h2>2 segmentos</h2>
      <ul class="eva-3-segmented-control -segments-2">
        <li class="segmented-item">
          <button class="segmented-button -active" type="button">Lista</button>
        </li>
        <li class="segmented-item">
          <button class="segmented-button" type="button">Mapa</button>
        </li>
      </ul>
    </section>

    <section>
      <h2>3 segmentos con ícono</h2>
      <ul class="eva-3-segmented-control -segments-3">
        <li class="segmented-item">
          <button class="segmented-button -active" type="button">Vuelos</button>
        </li>
        <li class="segmented-item">
          <button class="segmented-button" type="button">Hoteles</button>
        </li>
        <li class="segmented-item">
          <button class="segmented-button" type="button">
            <i class="segmented-button-icon eva-3-icon -car"></i>
            Autos
          </button>
        </li>
      </ul>
    </section>

    <section>
      <h2>Variante darken</h2>
      <ul class="eva-3-segmented-control -segments-2 -darken">
        <li class="segmented-item">
          <button class="segmented-button -active" type="button">Ida y vuelta</button>
        </li>
        <li class="segmented-item">
          <button class="segmented-button" type="button">Solo ida</button>
        </li>
      </ul>
    </section>
  </body>
</html>
