<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RadioButton – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>RadioButton</h1>

    <section>
      <h2>Default</h2>
      <div class="row">
        <span class="eva-3-radio -md">
          <label class="radio-label-container" for="r1">
            <input class="radio-tag" id="r1" type="radio" name="example" />
            <i class="radio-circle"></i>
          </label>
        </span>
        <span class="eva-3-radio -md">
          <label class="radio-label-container" for="r2">
            <input class="radio-tag" id="r2" type="radio" name="example" checked />
            <i class="radio-circle"></i>
          </label>
        </span>
        <span class="eva-3-radio -md">
          <label class="radio-label-container" for="r3">
            <input class="radio-tag" id="r3" type="radio" name="example" disabled />
            <i class="radio-circle"></i>
          </label>
        </span>
      </div>
    </section>

    <section>
      <h2>Lighten (fondo oscuro)</h2>
      <div class="row dark-bg">
        <span class="eva-3-radio -md -lighten">
          <label class="radio-label-container" for="r4">
            <input class="radio-tag" id="r4" type="radio" name="example-2" />
            <i class="radio-circle"></i>
          </label>
        </span>
        <span class="eva-3-radio -md -lighten">
          <label class="radio-label-container" for="r5">
            <input class="radio-tag" id="r5" type="radio" name="example-2" checked />
            <i class="radio-circle"></i>
          </label>
        </span>
      </div>
    </section>
  </body>
</html>
