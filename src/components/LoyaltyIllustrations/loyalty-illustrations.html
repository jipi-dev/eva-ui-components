<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoyaltyIllustrations – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>LoyaltyIllustrations</h1>

    <style>
      .illus-grid { display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1rem; }
      .illus-item { display:flex;flex-direction:column;align-items:center;gap:.5rem;font-size:.75rem;color:#555; }
      .illus-img { width:80px;height:80px;object-fit:contain; }
    </style>

    <section>
      <h2>Benefits (Beneficios)</h2>
      <div class="illus-grid">
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-benefits-calendar.svg" alt="benefits-calendar" />
          <span>benefits-calendar</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-benefits-discounts.svg" alt="benefits-discounts" />
          <span>benefits-discounts</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-benefits-pay-with-points.svg" alt="benefits-pay-with-points" />
          <span>benefits-pay-with-points</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-benefits-plane.svg" alt="benefits-plane" />
          <span>benefits-plane</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-benefits-validity.svg" alt="benefits-validity" />
          <span>benefits-validity</span>
        </div>
      </div>
    </section>

    <section>
      <h2>Mechanics</h2>
      <div class="illus-grid">
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-mechanics-arrow.svg" alt="mechanics-arrow" />
          <span>mechanics-arrow</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-mechanics-check.svg" alt="mechanics-check" />
          <span>mechanics-check</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-mechanics-passport.svg" alt="mechanics-passport" />
          <span>mechanics-passport</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-mechanics-travel.svg" alt="mechanics-travel" />
          <span>mechanics-travel</span>
        </div>
      </div>
    </section>

    <section>
      <h2>Feedback</h2>
      <div class="illus-grid">
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-feedback-success.svg" alt="feedback-success" />
          <span>feedback-success</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-feedback-error.svg" alt="feedback-error" />
          <span>feedback-error</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="/ui/dist/resources/sprites/ly-feedback-on-hold.svg" alt="feedback-on-hold" />
          <span>feedback-on-hold</span>
        </div>
      </div>
    </section>
  </body>
</html>
