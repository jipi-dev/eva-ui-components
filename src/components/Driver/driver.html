<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Driver</h1>

    <section>
      <h2>Variantes de atributos</h2>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem">
        <div class="eva-3-driver"><span class="driver-text">Default</span></div>
        <div class="eva-3-driver -default-lighten"><span class="driver-text">Default lighten</span></div>
        <div class="eva-3-driver -secondary"><span class="driver-text">Secondary</span></div>
        <div class="eva-3-driver -benefits"><span class="driver-text">Benefits</span></div>
        <div class="eva-3-driver -urgent"><span class="driver-text">Urgent</span></div>
      </div>
    </section>

    <section>
      <h2>New</h2>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem">
        <div class="eva-3-driver -new"><span class="driver-text">New</span></div>
        <div class="eva-3-driver -new-lighten"><span class="driver-text">New lighten</span></div>
      </div>
    </section>

    <section>
      <h2>Estados</h2>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem">
        <div class="eva-3-driver -information"><span class="driver-text">Information</span></div>
        <div class="eva-3-driver -success"><span class="driver-text">Success</span></div>
        <div class="eva-3-driver -warning"><span class="driver-text">Warning</span></div>
        <div class="eva-3-driver -error"><span class="driver-text">Error</span></div>
      </div>
    </section>

    <section>
      <h2>Submarcas</h2>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem">
        <div class="eva-3-driver -loyalty"><span class="driver-text">Loyalty</span></div>
        <div class="eva-3-driver -unbeatable"><span class="driver-text">Unbeatable</span></div>
      </div>
    </section>

    <section>
      <h2>Con ícono</h2>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem">
        <div class="eva-3-driver -benefits"><i class="eva-3-icon-star-filled driver-icon"></i><span class="driver-text">Con ícono</span></div>
        <div class="eva-3-driver -loyalty"><i class="eva-3-icon-loyalty-filled driver-icon"></i><span class="driver-text">Loyalty + icon</span></div>
      </div>
    </section>
  </body>
</html>
