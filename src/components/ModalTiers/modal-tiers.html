<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ModalTiers – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>ModalTiers</h1>

    <section>
      <h2>Explorer tier</h2>
      <div class="eva-3-modal-tiers -show -explorer" style="max-width:420px;position:relative">
        <div class="modal-coachmark-header">
          <button class="modal-coachmark-close"><i class="eva-3-icon-cross"></i></button>
        </div>
        <div class="modal-coachmark-body">
          <div class="modal-coachmark-step -active">
            <div class="modal-coachmark-image" style="height:180px;background:var(--loyalty-tier-explorer,#4A90D9)"></div>
            <div class="modal-coachmark-content">
              <h3 class="modal-coachmark-title">Tier Explorer</h3>
              <p class="modal-coachmark-description">Empezá a suma puntos y desbloqué beneficios exclusivos.</p>
            </div>
          </div>
        </div>
        <div class="modal-coachmark-footer">
          <button class="eva-3-btn -primary -md">Empezar</button>
        </div>
      </div>
    </section>

    <section>
      <h2>Traveler tier</h2>
      <div class="eva-3-modal-tiers -show -traveler" style="max-width:420px;position:relative">
        <div class="modal-coachmark-header">
          <button class="modal-coachmark-close"><i class="eva-3-icon-cross"></i></button>
        </div>
        <div class="modal-coachmark-body">
          <div class="modal-coachmark-step -active">
            <div class="modal-coachmark-image" style="height:180px;background:var(--loyalty-tier-traveler,#7B68EE)"></div>
            <div class="modal-coachmark-content">
              <h3 class="modal-coachmark-title">Tier Traveler</h3>
              <p class="modal-coachmark-description">Disfrutá de más beneficios con el nivel Traveler.</p>
            </div>
          </div>
        </div>
        <div class="modal-coachmark-footer">
          <button class="eva-3-btn -primary -md">Siguiente</button>
        </div>
      </div>
    </section>

    <section>
      <h2>Global tier</h2>
      <div class="eva-3-modal-tiers -show -global" style="max-width:420px;position:relative">
        <div class="modal-coachmark-header">
          <button class="modal-coachmark-close"><i class="eva-3-icon-cross"></i></button>
        </div>
        <div class="modal-coachmark-body">
          <div class="modal-coachmark-step -active">
            <div class="modal-coachmark-image" style="height:180px;background:var(--loyalty-tier-global,#C8991F)"></div>
            <div class="modal-coachmark-content">
              <h3 class="modal-coachmark-title">Tier Global</h3>
              <p class="modal-coachmark-description">El nivel más alto de Pasaporte Despegar.</p>
            </div>
          </div>
        </div>
        <div class="modal-coachmark-footer">
          <button class="eva-3-btn -primary -md">Cerrar</button>
        </div>
      </div>
    </section>
  </body>
</html>
