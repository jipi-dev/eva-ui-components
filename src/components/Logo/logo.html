<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Logo</h1>

    <section>
      <h2>Despegar – Horizontal</h2>
      <div class="row">
        <img src="https://www.staticontent.com/eva-core/assets/logos/0.0.1/isologo_despegar_horizontal_primary.svg" alt="Despegar primary" style="height:40px" />
        <div class="dark-bg" style="padding:12px;display:inline-flex">
          <img src="https://www.staticontent.com/eva-core/assets/logos/0.0.1/isologo_despegar_horizontal_white.svg" alt="Despegar white" style="height:40px" />
        </div>
      </div>
    </section>

    <section>
      <h2>Despegar – Símbolo</h2>
      <div class="row">
        <img src="https://www.staticontent.com/eva-core/assets/logos/0.0.1/symbol_primary.svg" alt="Symbol primary" style="height:48px" />
        <div class="dark-bg" style="padding:12px;display:inline-flex">
          <img src="https://www.staticontent.com/eva-core/assets/logos/0.0.1/symbol_white.svg" alt="Symbol white" style="height:48px" />
        </div>
      </div>
    </section>

    <section>
      <h2>Decolar – Horizontal</h2>
      <div class="row">
        <img src="https://www.staticontent.com/eva-core/assets/logos/0.0.1/isologo_decolar_horizontal_primary.svg" alt="Decolar primary" style="height:40px" />
        <div class="dark-bg" style="padding:12px;display:inline-flex">
          <img src="https://www.staticontent.com/eva-core/assets/logos/0.0.1/isologo_decolar_horizontal_white.svg" alt="Decolar white" style="height:40px" />
        </div>
      </div>
    </section>
  </body>
</html>
