<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Card</h1>

    <section>
      <h2>Sombras</h2>
      <div class="row">
        <div class="eva-3-card -eva-3-p-md card-wrap" style="padding:16px">
          Card sin sombra
        </div>
        <div class="eva-3-card -eva-3-shadow-1 -eva-3-p-md card-wrap" style="padding:16px">
          Shadow 1
        </div>
        <div class="eva-3-card -eva-3-shadow-2 -eva-3-p-md card-wrap" style="padding:16px">
          Shadow 2
        </div>
        <div class="eva-3-card -eva-3-shadow-static -eva-3-p-md card-wrap" style="padding:16px">
          Shadow static
        </div>
      </div>
    </section>

    <section>
      <h2>Hover</h2>
      <div class="row">
        <div class="eva-3-card -eva-3-shadow-1-hover card-wrap" style="padding:16px;cursor:pointer">
          Hover shadow 1
        </div>
        <div class="eva-3-card -eva-3-shadow-static-hover card-wrap" style="padding:16px;cursor:pointer">
          Hover shadow static
        </div>
      </div>
    </section>
  </body>
</html>
