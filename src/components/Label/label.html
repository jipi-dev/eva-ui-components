<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Label – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Label</h1>

    <section>
      <h2>Variantes</h2>
      <div class="row">
        <div class="eva-3-label -sm -top-left">
          <span class="label-container">
            <span class="eva-3-bold label-text">-20%</span>
          </span>
        </div>
        <div class="eva-3-label -md -top-left">
          <span class="label-container">
            <span class="eva-3-bold label-text">OFERTA</span>
          </span>
        </div>
        <div class="eva-3-label -md -bottom-right">
          <span class="label-container">
            <span class="eva-3-bold label-text">NUEVO</span>
          </span>
        </div>
      </div>
    </section>

    <section>
      <h2>Con ícono</h2>
      <div class="row">
        <div class="eva-3-label -md -top-left">
          <span class="label-container">
            <i class="eva-3-icon -gift label-icon -eva-3-tc-red-3"></i>
            <span class="eva-3-bold label-text">%</span>
          </span>
        </div>
      </div>
    </section>
  </body>
</html>
