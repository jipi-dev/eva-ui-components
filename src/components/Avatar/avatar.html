<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Avatar</h1>

    <section>
      <h2>Imagen</h2>
      <div class="row">
        <div class="eva-3-avatar -image">
          <img class="avatar-image" src="https://i.pravatar.cc/80" alt="Avatar Usuario" />
        </div>
        <div class="eva-3-avatar -image -md">
          <img class="avatar-image" src="https://i.pravatar.cc/48" alt="Avatar Mediano" />
        </div>
      </div>
    </section>

    <section>
      <h2>Letra</h2>
      <div class="row">
        <div class="eva-3-avatar -letter">
          <span class="avatar-letter">A</span>
        </div>
        <div class="eva-3-avatar -letter -md">
          <span class="avatar-letter">B</span>
        </div>
      </div>
    </section>

    <section>
      <h2>Ícono</h2>
      <div class="row">
        <div class="eva-3-avatar -icon">
          <span class="avatar-icon"><i class="eva-3-icon -user"></i></span>
        </div>
        <div class="eva-3-avatar -icon -md">
          <span class="avatar-icon"><i class="eva-3-icon -user"></i></span>
        </div>
      </div>
    </section>
  </body>
</html>
