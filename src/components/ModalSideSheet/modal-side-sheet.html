<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal Side Sheet – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Modal Side Sheet</h1>

    <section>
      <h2>Side Sheet – derecha (small)</h2>
      <div style="position:relative;height:400px;border:1px dashed #ccc;overflow:hidden;background:#f4f4f4">
        <div class="eva-3-modal-side-sheet -show-modal-side-sheet -right -sm" style="position:absolute">
          <div class="sheet-container">
            <div class="sheet-header">
              <h4 class="sheet-title">Filtros</h4>
              <i class="modal-close eva-3-icon -cross" role="button" aria-label="Close modal"></i>
            </div>
            <div class="sheet-content">
              <p>Contenido del side sheet lateral. Ideal para filtros o detalles complementarios.</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
