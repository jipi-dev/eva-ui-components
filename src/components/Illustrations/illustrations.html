<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Illustrations – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Illustrations</h1>

    <style>
      .illus-grid { display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1rem; }
      .illus-item { display:flex;flex-direction:column;align-items:center;gap:.5rem;font-size:.75rem;color:#555; }
      .illus-img { width:80px;height:80px;object-fit:contain; }
    </style>

    <section>
      <h2>Escenas</h2>
      <div class="illus-grid">
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/scenes/0.0.8/feedback-success.svg" alt="feedback-success" />
          <span>feedback-success</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/scenes/0.0.8/feedback-error.svg" alt="feedback-error" />
          <span>feedback-error</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/scenes/0.0.8/feedback-empty-state.svg" alt="feedback-empty-state" />
          <span>feedback-empty-state</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/scenes/0.0.8/feedback-loading.svg" alt="feedback-loading" />
          <span>feedback-loading</span>
        </div>
      </div>
    </section>

    <section>
      <h2>Íconos ilustrados</h2>
      <div class="illus-grid">
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/icons/0.0.9/airplane.svg" alt="airplane" />
          <span>airplane</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/icons/0.0.9/hotel-1.svg" alt="hotel-1" />
          <span>hotel-1</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/icons/0.0.9/suitcase.svg" alt="suitcase" />
          <span>suitcase</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/icons/0.0.9/calendar-booking.svg" alt="calendar-booking" />
          <span>calendar-booking</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/icons/0.0.9/credit-card.svg" alt="credit-card" />
          <span>credit-card</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/icons/0.0.9/people.svg" alt="people" />
          <span>people</span>
        </div>
      </div>
    </section>

    <section>
      <h2>Composiciones</h2>
      <div class="illus-grid">
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/compositions/0.0.8/suitcase-ok.svg" alt="suitcase-ok" />
          <span>suitcase-ok</span>
        </div>
        <div class="illus-item">
          <img class="illus-img" src="https://www.staticontent.com/eva-core/assets/illustrations/despegar/compositions/0.0.8/hotels.svg" alt="hotels" />
          <span>hotels</span>
        </div>
      </div>
    </section>
  </body>
</html>
