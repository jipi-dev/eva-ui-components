<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal Bottom Sheet – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Modal Bottom Sheet</h1>

    <section>
      <h2>Bottom Sheet (visible para demo)</h2>
      <div style="position:relative;height:400px;border:1px dashed #ccc;overflow:hidden;border-radius:4px;background:#f4f4f4">
        <div class="eva-3-modal-bottom-sheet -show-modal-bottom-sheet" style="position:absolute">
          <div class="sheet-container">
            <h4 class="sheet-title">Título del sheet</h4>
            <div class="sheet-content">
              <p>Contenido del bottom sheet. Ideal para móvil: opciones, filtros, listas cortas.</p>
            </div>
            <div class="sheet-footer">
              <button type="button" class="eva-3-btn -lg -primary" style="width:100%"><em class="btn-text">Confirmar</em></button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
