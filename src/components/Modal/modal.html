<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Modal</h1>

    <section>
      <h2>Modal (visible por defecto para demo)</h2>
      <div style="position:relative;height:400px;border:1px dashed #ccc;overflow:hidden;border-radius:4px">
        <div class="eva-3-modal -show-modal" style="position:absolute">
          <div class="modal-overlay"></div>
          <div class="modal-header">
            <div class="modal-title-container">
              <h4 class="modal-title">Título del modal</h4>
            </div>
            <i class="eva-3-icon -cross modal-close" role="button" tabindex="0" aria-label="Close modal"></i>
          </div>
          <div class="modal-content">
            <p>Contenido del modal. Podés añadir formularios, información o cualquier contenido aquí.</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="eva-3-btn -lg -primary"><em class="btn-text">Aceptar</em></button>
            <button type="button" class="eva-3-btn -ghost -lg"><em class="btn-text">Cancelar</em></button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
