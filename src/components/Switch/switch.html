<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Switch – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Switch</h1>

    <section>
      <h2>Default</h2>
      <div class="row">
        <span class="eva-3-switch">
          <label class="switch-label" for="sw-1">
            <input class="switch-input" type="checkbox" id="sw-1" />
            <span class="switch-container"><span class="switch-circle"></span></span>
          </label>
        </span>
        <span class="eva-3-switch">
          <label class="switch-label" for="sw-2">
            <input class="switch-input" type="checkbox" id="sw-2" checked />
            <span class="switch-container"><span class="switch-circle"></span></span>
          </label>
        </span>
        <span class="eva-3-switch">
          <label class="switch-label" for="sw-3">
            <input class="switch-input" type="checkbox" id="sw-3" disabled />
            <span class="switch-container"><span class="switch-circle"></span></span>
          </label>
        </span>
      </div>
    </section>

    <section>
      <h2>Tamaño -md</h2>
      <div class="row">
        <span class="eva-3-switch -md">
          <label class="switch-label" for="sw-4">
            <input class="switch-input" type="checkbox" id="sw-4" />
            <span class="switch-container"><span class="switch-circle"></span></span>
          </label>
        </span>
        <span class="eva-3-switch -md">
          <label class="switch-label" for="sw-5">
            <input class="switch-input" type="checkbox" id="sw-5" checked />
            <span class="switch-container"><span class="switch-circle"></span></span>
          </label>
        </span>
      </div>
    </section>

    <section>
      <h2>Loyalty</h2>
      <div class="row">
        <span class="eva-3-switch -loyalty">
          <label class="switch-label" for="sw-6">
            <input class="switch-input" type="checkbox" id="sw-6" checked />
            <span class="switch-container"><span class="switch-circle"></span></span>
          </label>
        </span>
      </div>
    </section>

    <section>
      <h2>Lighten (fondo oscuro)</h2>
      <div class="row dark-bg">
        <span class="eva-3-switch -lighten">
          <label class="switch-label" for="sw-7">
            <input class="switch-input" type="checkbox" id="sw-7" checked />
            <span class="switch-container"><span class="switch-circle"></span></span>
          </label>
        </span>
      </div>
    </section>
  </body>
</html>
