<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nav Dots – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Nav Dots</h1>

    <section>
      <h2>Default</h2>
      <ul class="eva-3-nav-dots -center">
        <li class="nav-dot -active"></li>
        <li class="nav-dot"></li>
        <li class="nav-dot"></li>
        <li class="nav-dot"></li>
      </ul>
    </section>

    <section>
      <h2>Tamaños</h2>
      <span class="label">small</span>
      <ul class="eva-3-nav-dots -center -sm">
        <li class="nav-dot -active"></li>
        <li class="nav-dot"></li>
        <li class="nav-dot"></li>
      </ul>
      <span class="label">large</span>
      <ul class="eva-3-nav-dots -center -lg">
        <li class="nav-dot -active"></li>
        <li class="nav-dot"></li>
        <li class="nav-dot"></li>
      </ul>
    </section>

    <section>
      <h2>Lighten (fondo oscuro)</h2>
      <div class="dark-bg">
        <ul class="eva-3-nav-dots -center -lighten">
          <li class="nav-dot -active"></li>
          <li class="nav-dot"></li>
          <li class="nav-dot"></li>
        </ul>
      </div>
    </section>
  </body>
</html>
