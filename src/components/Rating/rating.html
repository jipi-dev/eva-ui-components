<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rating – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Rating</h1>

    <section>
      <h2>Tamaños y estados</h2>
      <div class="row">
        <div class="eva-3-rating -good -lg"><span class="rating-text">9.2</span></div>
        <div class="eva-3-rating -good -md"><span class="rating-text">8.5</span></div>
        <div class="eva-3-rating -good -sm"><span class="rating-text">8.0</span></div>
        <div class="eva-3-rating -regular -lg"><span class="rating-text">6.3</span></div>
        <div class="eva-3-rating -regular -md"><span class="rating-text">5.8</span></div>
      </div>
    </section>
  </body>
</html>
