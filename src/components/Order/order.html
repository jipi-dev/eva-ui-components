<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>Order</h1>

    <section>
      <h2>Default</h2>
      <div class="eva-3-order -eva-3-shadow-static">
        <ul class="order-container">
          <li class="order-item">
            <span class="order-link">
              <i class="order-item-icon -filter"></i>
              <span class="order-text">Filtros</span>
            </span>
          </li>
          <li class="order-item">
            <span class="order-link">
              <i class="order-item-icon -order"></i>
              <span class="order-text">Ordenar</span>
            </span>
          </li>
          <li class="order-item">
            <span class="order-link">
              <i class="order-item-icon -location"></i>
              <span class="order-text">Mapa</span>
            </span>
          </li>
        </ul>
      </div>
    </section>

    <section>
      <h2>Con badge numérico</h2>
      <div class="eva-3-order -eva-3-shadow-static">
        <ul class="order-container">
          <li class="order-item">
            <span class="order-link">
              <span class="order-item-badge">3</span>
              <span class="order-text">Filtros</span>
            </span>
          </li>
          <li class="order-item">
            <span class="order-link">
              <span class="order-item-badge">8</span>
              <span class="order-text">Alertas</span>
            </span>
          </li>
          <li class="order-item">
            <span class="order-link">
              <i class="order-item-icon -list"></i>
              <span class="order-text">Lista</span>
            </span>
          </li>
        </ul>
      </div>
    </section>
  </body>
</html>
