<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InputField – Eva Design System</title>
    <link rel="stylesheet" href="/eva/eva-core.min.css" />
    <link rel="stylesheet" href="/eva/eva.min.css" />
  </head>
  <body>
    <h1>InputField</h1>

    <section>
      <h2>Con Label</h2>
      <div style="max-width:320px">
        <label class="eva-3-label-form -md" for="field-name" style="display:block;margin-bottom:6px">Nombre</label>
        <div class="eva-3-input -lg">
          <div class="input-container">
            <input id="field-name" class="input-tag" type="text" placeholder="Ingresá tu nombre" />
          </div>
        </div>
      </div>
    </section>

    <section>
      <h2>Con Label + inválido</h2>
      <div style="max-width:320px">
        <label class="eva-3-label-form -md" for="field-email" style="display:block;margin-bottom:6px">Email</label>
        <div class="eva-3-input -lg -invalid">
          <div class="input-container">
            <input id="field-email" class="input-tag" type="email" placeholder="email@ejemplo.com" />
          </div>
        </div>
        <span style="font-size:12px;color:var(--color-error-500,#e53935)">Ingresá un email válido</span>
      </div>
    </section>
  </body>
</html>
